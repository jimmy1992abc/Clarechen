name: Daily Pages rebuild

# Static sites bake their HTML at build time, so "upcoming events" gets
# frozen to whatever was upcoming on the last build. This rebuilds the
# site once a day so past events drop off automatically.

on:
  schedule:
    # 14:00 UTC = 00:00 AEST (winter) / 01:00 AEDT (summer)
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger GitHub Pages rebuild
        run: |
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds"
