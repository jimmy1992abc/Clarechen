---
layout: default
---
<style>
  .article { max-width: 720px; margin: 0 auto; padding: 80px 24px 60px; }
  .article__meta { color: var(--muted); font-size: 13px; font-weight: 700; margin-bottom: 12px; letter-spacing: .02em; }
  .article__title { font-family: var(--font-serif); font-size: clamp(32px, 5vw, 52px); margin: 0 0 18px; letter-spacing: -0.02em; line-height: 1.05; }
  .article__lead { color: var(--muted); font-size: 18px; line-height: 1.65; margin: 0 0 32px; }
  .article__body { color: rgba(234,240,255,.88); line-height: 1.8; font-size: 17px; }
  .article__body h1, .article__body h2, .article__body h3 { font-family: var(--font-serif); color: var(--text); letter-spacing: -0.01em; }
  .article__body h1 { font-size: 32px; margin: 48px 0 18px; }
  .article__body h2 { font-size: 26px; margin: 42px 0 16px; }
  .article__body h3 { font-size: 20px; margin: 32px 0 12px; }
  .article__body p { margin: 0 0 18px; }
  .article__body ul, .article__body ol { color: var(--muted); padding-left: 22px; margin: 0 0 22px; }
  .article__body li { margin-bottom: 8px; line-height: 1.7; }
  .article__body strong { color: var(--text); }
  .back-link { display: inline-flex; align-items: center; gap: 8px; color: var(--accent); margin-bottom: 24px; font-size: 14px; transition: gap .2s ease; }
  .back-link:hover { gap: 12px; }
  .back-link::before { content: "←"; }
</style>

<article class="article">
  <a class="back-link" href="{{ '/writing/' | relative_url }}">Back to writing</a>
  <div class="article__meta">
    {{ page.date | date: "%-d %B %Y" }} &middot; Note
    {% if page.readTime %} &middot; {{ page.readTime }}{% endif %}
  </div>
  <h1 class="article__title">{{ page.title }}</h1>
  {% if page.description %}<p class="article__lead">{{ page.description }}</p>{% endif %}
  <div class="article__body">
    {{ content }}
  </div>
</article>
