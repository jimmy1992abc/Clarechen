<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b1220" />
  <title>Event — Clare Chen</title>
  <meta name="description" content="Event details and registration" />

  <!-- Open Graph -->
  <meta property="og:title" content="Event — Clare Chen" />
  <meta property="og:description" content="Join us for an upcoming event." />
  <meta property="og:type" content="website" />

  <!-- Fonts (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../assets/css/site.css" />
  <style>
    /* Event detail page specific styles */
    .event-hero {
      padding: 80px 0 60px;
      text-align: center;
    }

    .event-hero__title {
      font-family: var(--font-serif);
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 600;
      margin: 0 0 24px;
      letter-spacing: -0.02em;
    }

    .event-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 24px;
      margin: 48px 0;
      padding: 32px;
      background: rgba(118,169,255,.08);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .event-meta__item {
      text-align: center;
    }

    .event-meta__label {
      display: block;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .event-meta__value {
      display: block;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    .event-content {
      max-width: 720px;
      margin: 48px auto;
      padding: 0 24px;
    }

    .event-content h2 {
      font-family: var(--font-serif);
      font-size: 28px;
      margin: 40px 0 16px;
      color: var(--text);
    }

    .event-content p {
      line-height: 1.7;
      color: var(--muted);
      margin: 0 0 16px;
    }

    .event-content ul {
      list-style: none;
      padding: 0;
      margin: 0 0 24px;
    }

    .event-content li {
      padding: 8px 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .event-content li::before {
      content: "→ ";
      color: var(--accent);
      margin-right: 8px;
    }

    .jotform-container {
      max-width: 720px;
      margin: 60px auto;
      padding: 40px;
      background: rgba(118,169,255,.06);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .jotform-container h3 {
      font-size: 20px;
      margin-top: 0;
      margin-bottom: 24px;
      color: var(--text);
    }

    .jotform-container iframe {
      width: 100%;
      border: none;
      border-radius: 12px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      margin-bottom: 24px;
      font-size: 14px;
      transition: gap 0.2s ease;
    }

    .back-link:hover {
      gap: 12px;
    }

    .back-link::before {
      content: "←";
    }
  </style>
</head>

<body>
  <!-- Top progress indicator -->
  <div class="scrollbar" aria-hidden="true">
    <div class="scrollbar__bar" id="scrollbarBar"></div>
  </div>

  <header class="header" id="header">
    <div class="container header__inner">
      <a class="brand" href="/" aria-label="Home">
        <span class="brand__dot" aria-hidden="true"></span>
        <span class="brand__text">Clare Chen</span>
      </a>

      <nav class="nav" aria-label="Primary">
        <button class="nav__toggle" id="navToggle" aria-expanded="false" aria-controls="navMenu">
          <span class="nav__toggleLines" aria-hidden="true"></span>
          <span class="sr-only">Open menu</span>
        </button>

        <div class="nav__menu" id="navMenu">
          <a class="nav__link" href="/#about">About</a>
          <a class="nav__link" href="/#event">Events</a>
          <a class="nav__link" href="/#writing">Writing</a>
          <a class="nav__link" href="/#contact">Contact</a>
          <a class="btn btn--ghost" href="/#contact">Let's talk</a>
        </div>
      </nav>
    </div>
  </header>

  <main id="top">
    <section class="event-hero">
      <div class="container">
        <a class="back-link" href="/#event">Back to events</a>
        
        <h1 class="event-hero__title" id="eventTitle">Loading event...</h1>
        
        <div class="event-meta">
          <div class="event-meta__item">
            <span class="event-meta__label">Date</span>
            <span class="event-meta__value" id="eventDate">—</span>
          </div>
          <div class="event-meta__item">
            <span class="event-meta__label">Time</span>
            <span class="event-meta__value" id="eventTime">—</span>
          </div>
          <div class="event-meta__item">
            <span class="event-meta__label">Location</span>
            <span class="event-meta__value" id="eventLocation">—</span>
          </div>
        </div>

        <div class="event-content" id="eventContent">
          <p style="color: var(--muted);">Loading event details...</p>
        </div>

        <div class="jotform-container">
          <h3>Register for this event</h3>
          <div id="jotformContainer">
            <p style="color: var(--muted); text-align: center;">Loading registration form...</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <div class="footer__left">
        <span class="brand__dot" aria-hidden="true"></span>
        <span>© <span id="year"></span> Clarechen.com.au</span>
      </div>
      <div class="footer__right">
        <a class="link link--muted" href="#top">Back to top</a>
      </div>
    </div>
  </footer>

  <script src="../assets/js/site.js" defer></script>
  <script src="../assets/js/events.js" defer></script>
  <script defer>
    // Parse URL to get event slug
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const eventSlug = pathParts[pathParts.indexOf('event') + 1];

    // Load and display event
    async function loadEventDetails() {
      try {
        const event = await parseMarkdownFile(`/event/events/${eventSlug}.md`);
        
        if (!event || !event.frontmatter.published) {
          document.getElementById('eventTitle').textContent = 'Event not found';
          document.getElementById('eventContent').innerHTML = '<p style="color: var(--muted);">This event is not available.</p>';
          return;
        }

        const { frontmatter, content } = event;
        const dateFormatted = formatDateLong(frontmatter.date);

        // Update page title and meta
        document.title = `${frontmatter.title} — Clare Chen`;
        document.querySelector('meta[property="og:title"]').setAttribute('content', `${frontmatter.title} — Clare Chen`);
        document.querySelector('meta[property="og:description"]').setAttribute('content', frontmatter.description);

        // Fill in event details
        document.getElementById('eventTitle').textContent = frontmatter.title;
        document.getElementById('eventDate').textContent = dateFormatted;
        document.getElementById('eventTime').textContent = frontmatter.time;
        document.getElementById('eventLocation').textContent = frontmatter.location;

        // Parse and display markdown content (skip frontmatter)
        const contentHtml = parseMarkdownContent(content);
        document.getElementById('eventContent').innerHTML = contentHtml;

        // Load JotForm
        const jotformContainer = document.getElementById('jotformContainer');
        jotformContainer.innerHTML = `<iframe src="https://form.jotform.com/${frontmatter.jotformId}" frameborder="0" style="min-height: 600px;"></iframe>`;

      } catch (error) {
        console.error('Error loading event:', error);
        document.getElementById('eventContent').innerHTML = '<p style="color: var(--muted);">Error loading event details. Please refresh the page.</p>';
      }
    }

    // Simple markdown to HTML parser
    function parseMarkdownContent(markdown) {
      let html = markdown
        .replace(/^### (.*?)$/gm, '<h3>$1</h3>')
        .replace(/^## (.*?)$/gm, '<h2>$1</h2>')
        .replace(/^# (.*?)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/^\- (.*?)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/^(?!<[hu]|<p|<ul)(.+)$/gm, '<p>$1</p>');
      
      return html;
    }

    // Set year in footer
    const year = document.getElementById('year');
    if (year) year.textContent = new Date().getFullYear();

    // Load event when page is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadEventDetails);
    } else {
      loadEventDetails();
    }
  </script>
</body>
</html>
