---
layout: default
title: "RSVP Confirmed — Clare Chen"
description: "RSVP confirmation and calendar download."
permalink: /event/thank-you/
sitemap: false
---

<style>
  .rsvp-shell { min-height: calc(100vh - 140px); display: grid; place-items: center; padding: 88px 0 56px; }
  .rsvp-card { width: min(720px, calc(100vw - 48px)); padding: clamp(28px, 4vw, 40px); background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.10); border-radius: 28px; box-shadow: var(--shadow); text-align: center; }
  .rsvp-kicker { margin: 0 0 16px; color: var(--accent); font-size: 12px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; }
  .rsvp-title { margin: 0; font-family: var(--font-serif); font-size: clamp(34px, 5vw, 54px); line-height: 1.05; letter-spacing: -0.03em; }
  .rsvp-lead { margin: 16px auto 0; max-width: 52ch; color: var(--muted); line-height: 1.7; }
  .rsvp-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin: 30px 0; text-align: left; }
  .rsvp-meta__item { padding: 16px 18px; border-radius: 18px; background: rgba(118,169,255,.08); border: 1px solid rgba(255,255,255,.08); }
  .rsvp-meta__label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; }
  .rsvp-meta__value { color: var(--text); font-size: 16px; font-weight: 600; line-height: 1.5; }
  .rsvp-actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 28px; }
  .calendar-pill { display: flex; align-items: center; justify-content: center; gap: 10px; min-height: 64px; padding: 0 32px; border: 1px solid rgba(118,169,255,.28); border-radius: 999px; background: linear-gradient(135deg, rgba(118,169,255,.22), rgba(118,169,255,.08)); color: var(--text); font-size: 15px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; box-shadow: 0 20px 44px rgba(0,0,0,.24); transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease; cursor: pointer; }
  .calendar-pill:hover { transform: translateY(-2px); border-color: rgba(118,169,255,.46); box-shadow: 0 26px 52px rgba(0,0,0,.28); }
  .calendar-pill::before { content: "+"; display: inline-grid; place-items: center; width: 26px; height: 26px; border-radius: 999px; background: rgba(255,255,255,.12); font-size: 16px; line-height: 1; }
  .rsvp-note { margin: 18px auto 0; max-width: 52ch; color: var(--muted); font-size: 14px; line-height: 1.6; }
  .rsvp-error { color: #ffb2b2; }
  @media (max-width: 640px) {
    .rsvp-shell { padding-top: 72px; }
    .rsvp-card { width: min(720px, calc(100vw - 28px)); padding: 24px 18px; }
    .rsvp-actions { flex-direction: column; }
    .calendar-pill, .rsvp-actions .btn { width: 100%; }
  }
</style>

<section class="rsvp-shell">
  <div class="rsvp-card" id="thankYouCard">
    <p class="rsvp-kicker">RSVP Received</p>
    <h1 class="rsvp-title">Loading event details…</h1>
    <p class="rsvp-lead">Preparing your calendar file.</p>
  </div>
</section>

<script id="events-data" type="application/json">
{
  {% for event in site.events %}
  "{{ event.slug }}": {
    "title": {{ event.title | jsonify }},
    "date": "{{ event.date | date: '%Y-%m-%d' }}",
    "dateFormatted": "{{ event.date | date: '%-d %B %Y' }}",
    "time": {{ event.time | default: '' | jsonify }},
    "location": {{ event.location | default: '' | jsonify }},
    "description": {{ event.description | default: '' | jsonify }},
    "url": "{{ event.url | relative_url }}"
  }{% unless forloop.last %},{% endunless %}
  {% endfor %}
}
</script>

<script defer>
  (function () {
    const EVENTS = JSON.parse(document.getElementById('events-data').textContent);

    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function escapeIcsText(value) {
      return String(value || '')
        .replace(/\\/g, '\\\\')
        .replace(/;/g, '\\;')
        .replace(/,/g, '\\,')
        .replace(/\n/g, '\\n');
    }

    function toIcsTimestamp(date) {
      const pad = (n) => String(n).padStart(2, '0');
      return `${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}T${pad(date.getHours())}${pad(date.getMinutes())}${pad(date.getSeconds())}`;
    }

    function parseEventDateTime(dateString, timeString) {
      if (!dateString) return null;
      if (!timeString) return new Date(`${dateString}T09:00:00`);
      const m = timeString.trim().match(/^(\d{1,2})(?::(\d{2}))?\s*(AM|PM)$/i);
      if (!m) return new Date(`${dateString}T09:00:00`);
      let hours = Number(m[1]);
      const minutes = Number(m[2] || '0');
      const meridiem = m[3].toUpperCase();
      if (meridiem === 'PM' && hours !== 12) hours += 12;
      if (meridiem === 'AM' && hours === 12) hours = 0;
      const date = new Date(`${dateString}T00:00:00`);
      date.setHours(hours, minutes, 0, 0);
      return date;
    }

    function buildIcs(slug, ev) {
      const startDate = parseEventDateTime(ev.date, ev.time);
      const endDate = new Date(startDate.getTime() + 2 * 60 * 60 * 1000);
      const eventUrl = window.location.origin + ev.url;
      const uid = `${slug}-${ev.date}@clarechen.com.au`;
      return [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//Clare Chen//RSVP Calendar//EN',
        'CALSCALE:GREGORIAN',
        'BEGIN:VEVENT',
        `UID:${uid}`,
        `DTSTAMP:${toIcsTimestamp(new Date())}Z`,
        `DTSTART;TZID=Australia/Sydney:${toIcsTimestamp(startDate)}`,
        `DTEND;TZID=Australia/Sydney:${toIcsTimestamp(endDate)}`,
        `SUMMARY:${escapeIcsText(ev.title)}`,
        `DESCRIPTION:${escapeIcsText(ev.description)}\\n\\n${escapeIcsText(eventUrl)}`,
        `LOCATION:${escapeIcsText(ev.location)}`,
        `URL:${eventUrl}`,
        'END:VEVENT',
        'END:VCALENDAR'
      ].join('\r\n');
    }

    function downloadIcs(slug) {
      const ev = EVENTS[slug];
      const blob = new Blob([buildIcs(slug, ev)], { type: 'text/calendar;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `${slug}.ics`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const card = document.getElementById('thankYouCard');
      const slug = getQueryParam('event');
      const ev = slug ? EVENTS[slug] : null;

      if (!ev) {
        card.innerHTML = `
          <p class="rsvp-kicker">RSVP Confirmed</p>
          <h1 class="rsvp-title">Your RSVP is in</h1>
          <p class="rsvp-lead">Thanks for RSVPing.</p>
          <div class="rsvp-actions">
            <a class="btn btn--soft" href="/event/">Back to events</a>
            <a class="btn btn--soft" href="/#top">Back to home</a>
          </div>`;
        return;
      }

      card.innerHTML = `
        <p class="rsvp-kicker">RSVP Confirmed</p>
        <h1 class="rsvp-title">You're in for ${ev.title}</h1>
        <p class="rsvp-lead">Thanks for RSVPing. Save the event to your calendar so the details stay with you.</p>

        <div class="rsvp-meta">
          <div class="rsvp-meta__item"><span class="rsvp-meta__label">Date</span><span class="rsvp-meta__value">${ev.dateFormatted}</span></div>
          <div class="rsvp-meta__item"><span class="rsvp-meta__label">Time</span><span class="rsvp-meta__value">${ev.time || 'To be confirmed'}</span></div>
          <div class="rsvp-meta__item"><span class="rsvp-meta__label">Location</span><span class="rsvp-meta__value">${ev.location || 'To be confirmed'}</span></div>
        </div>

        <div class="rsvp-actions">
          <button class="calendar-pill" id="saveToCalendar" type="button">Save to Calendar</button>
          <a class="btn btn--soft" href="${ev.url}">Back to event</a>
          <a class="btn btn--soft" href="/#top">Back to home</a>
        </div>

        <p class="rsvp-note">The calendar file works with Apple Calendar, Outlook, and Google Calendar import.</p>
      `;

      document.getElementById('saveToCalendar').addEventListener('click', () => downloadIcs(slug));
    });
  })();
</script>
