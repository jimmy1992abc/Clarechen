<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b1220" />
  <title>RSVP Confirmed — Clare Chen</title>
  <meta name="description" content="RSVP confirmation and calendar download." />

  <meta property="og:title" content="RSVP Confirmed — Clare Chen" />
  <meta property="og:description" content="Save the event to your calendar." />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../assets/css/site.css" />
  <style>
    .rsvp-shell {
      min-height: calc(100vh - 140px);
      display: grid;
      place-items: center;
      padding: 88px 0 56px;
    }

    .rsvp-card {
      width: min(720px, calc(100vw - 48px));
      padding: clamp(28px, 4vw, 40px);
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 28px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .rsvp-kicker {
      margin: 0 0 16px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .rsvp-title {
      margin: 0;
      font-family: var(--font-serif);
      font-size: clamp(34px, 5vw, 54px);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .rsvp-lead {
      margin: 16px auto 0;
      max-width: 52ch;
      color: var(--muted);
      line-height: 1.7;
    }

    .rsvp-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin: 30px 0;
      text-align: left;
    }

    .rsvp-meta__item {
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(118,169,255,.08);
      border: 1px solid rgba(255,255,255,.08);
    }

    .rsvp-meta__label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .rsvp-meta__value {
      color: var(--text);
      font-size: 16px;
      font-weight: 600;
      line-height: 1.5;
    }

    .rsvp-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 28px;
    }

    .rsvp-actions__event {
      flex-basis: calc(38% - 9px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rsvp-actions__home {
      flex-basis: calc(62% - 9px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rsvp-actions__home.btn {
      width: 100%;
      text-align: center;
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.16);
      font-weight: 900;
      letter-spacing: .08em;
    }

    .rsvp-actions__home.btn:hover {
      background: rgba(255,255,255,.12);
      border-color: rgba(255,255,255,.24);
    }

    .calendar-pill {
      flex-basis:62%;
      width: fit-content;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 64px;
      padding: 0 32px;
      border: 1px solid rgba(118,169,255,.28);
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(118,169,255,.22), rgba(118,169,255,.08));
      color: var(--text);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: .1em;
      text-transform: uppercase;
      box-shadow: 0 20px 44px rgba(0,0,0,.24);
      transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
    }

    .calendar-pill:hover {
      transform: translateY(-2px);
      border-color: rgba(118,169,255,.46);
      box-shadow: 0 26px 52px rgba(0,0,0,.28);
    }

    .calendar-pill::before {
      content: "+";
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      font-size: 16px;
      line-height: 1;
    }

    .rsvp-note {
      margin: 18px auto 0;
      max-width: 52ch;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .rsvp-error {
      color: #ffb2b2;
    }

    @media (max-width: 640px) {
      .rsvp-shell {
        padding-top: 72px;
      }

      .rsvp-card {
        width: min(720px, calc(100vw - 28px));
        padding: 24px 18px;
      }

      .rsvp-actions {
        flex-direction: column;
      }

      .calendar-pill,
      .rsvp-actions .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="scrollbar" aria-hidden="true">
    <div class="scrollbar__bar" id="scrollbarBar"></div>
  </div>

  <header class="header" id="header">
    <div class="container header__inner">
      <a class="brand" href="/" aria-label="Home">
        <span class="brand__dot" aria-hidden="true"></span>
        <span class="brand__text">Clare Chen</span>
      </a>

      <nav class="nav" aria-label="Primary">
        <button class="nav__toggle" id="navToggle" aria-expanded="false" aria-controls="navMenu">
          <span class="nav__toggleLines" aria-hidden="true"></span>
          <span class="sr-only">Open menu</span>
        </button>

        <div class="nav__menu" id="navMenu">
          <a class="nav__link" href="/#about">About</a>
          <a class="nav__link" href="/#event">Event</a>
          <a class="nav__link" href="/#writing">Writing</a>
          <a class="nav__link" href="/#contact">Contact</a>
          <a class="btn btn--ghost" href="mailto:clarechenxy26@gmail.com">Let's talk</a>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <section class="rsvp-shell">
      <div class="rsvp-card" id="thankYouCard">
        <p class="rsvp-kicker">RSVP Received</p>
        <h1 class="rsvp-title">Loading event details...</h1>
        <p class="rsvp-lead">Preparing your calendar file.</p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <div class="footer__left">
        <span class="brand__dot" aria-hidden="true"></span>
        <span>© <span id="year"></span> Clarechen.com.au</span>
      </div>
      <div class="footer__right">
        <a class="link link--muted" href="/">Back to home</a>
      </div>
    </div>
  </footer>

  <script src="../assets/js/site.js" defer></script>
  <script>
    const year = document.getElementById('year');
    if (year) {
      year.textContent = new Date().getFullYear();
    }

    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function parseMarkdownFile(text) {
      const normalizedText = text.replace(/\r\n/g, '\n');
      const match = normalizedText.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);

      if (!match) {
        return null;
      }

      const [, frontmatterStr, content] = match;
      const frontmatter = {};

      frontmatterStr.split('\n').forEach((line) => {
        const [key, ...valueParts] = line.split(':');
        if (!key || valueParts.length === 0) {
          return;
        }

        let value = valueParts.join(':').trim();
        value = value.replace(/^["'](.*)["']$/, '$1');
        frontmatter[key.trim()] = value;
      });

      return { frontmatter, content };
    }

    function formatDateLong(dateString) {
      const date = new Date(`${dateString}T00:00:00`);
      return new Intl.DateTimeFormat('en-AU', {
        day: 'numeric',
        month: 'long',
        year: 'numeric'
      }).format(date);
    }

    function escapeIcsText(value) {
      return String(value || '')
        .replace(/\\/g, '\\\\')
        .replace(/;/g, '\\;')
        .replace(/,/g, '\\,')
        .replace(/\n/g, '\\n');
    }

    function toIcsTimestamp(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const seconds = String(date.getSeconds()).padStart(2, '0');
      return `${year}${month}${day}T${hours}${minutes}${seconds}`;
    }

    function parseEventDateTime(dateString, timeString) {
      if (!dateString) {
        return null;
      }

      if (!timeString) {
        return new Date(`${dateString}T09:00:00`);
      }

      const timeMatch = timeString.trim().match(/^(\d{1,2})(?::(\d{2}))?\s*(AM|PM)$/i);
      if (!timeMatch) {
        return new Date(`${dateString}T09:00:00`);
      }

      let hours = Number(timeMatch[1]);
      const minutes = Number(timeMatch[2] || '0');
      const meridiem = timeMatch[3].toUpperCase();

      if (meridiem === 'PM' && hours !== 12) {
        hours += 12;
      }

      if (meridiem === 'AM' && hours === 12) {
        hours = 0;
      }

      const date = new Date(`${dateString}T00:00:00`);
      date.setHours(hours, minutes, 0, 0);
      return date;
    }

    function buildCalendarData(eventData) {
      const { slug, frontmatter, content } = eventData;
      const startDate = parseEventDateTime(frontmatter.date, frontmatter.time);
      const endDate = parseEventDateTime(frontmatter.date, frontmatter.endTime) || new Date(startDate.getTime() + (2 * 60 * 60 * 1000));
      const description = (frontmatter.description || content || '').trim();
      const timezone = frontmatter.timezone || 'Australia/Sydney';
      const eventUrl = `${window.location.origin}/event/${slug}/`;
      const uid = `${slug}-${frontmatter.date || 'event'}@clarechen.com.au`;
      const now = new Date();

      return [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//Clare Chen//RSVP Calendar//EN',
        'CALSCALE:GREGORIAN',
        'BEGIN:VEVENT',
        `UID:${uid}`,
        `DTSTAMP:${toIcsTimestamp(now)}Z`,
        `DTSTART;TZID=${timezone}:${toIcsTimestamp(startDate)}`,
        `DTEND;TZID=${timezone}:${toIcsTimestamp(endDate)}`,
        `SUMMARY:${escapeIcsText(frontmatter.title)}`,
        `DESCRIPTION:${escapeIcsText(description)}\\n\\n${escapeIcsText(eventUrl)}`,
        `LOCATION:${escapeIcsText(frontmatter.location)}`,
        `URL:${eventUrl}`,
        'END:VEVENT',
        'END:VCALENDAR'
      ].join('\r\n');
    }

    function downloadCalendarFile(eventData) {
      const icsContent = buildCalendarData(eventData);
      const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');

      link.href = url;
      link.download = `${eventData.slug}.ics`;
      document.body.appendChild(link);
      link.click();
      link.remove();

      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    async function loadEvent(slug) {
      const response = await fetch(`https://raw.githubusercontent.com/jimmy1992abc/Clarechen.com.au/main/event/${slug}/${slug}.md`);
      if (!response.ok) {
        throw new Error('Failed to load event markdown');
      }

      const text = await response.text();
      const parsed = parseMarkdownFile(text);
      if (!parsed) {
        throw new Error('Invalid event markdown');
      }

      return {
        slug,
        frontmatter: parsed.frontmatter,
        content: parsed.content
      };
    }

    async function renderThankYouPage() {
      const card = document.getElementById('thankYouCard');
      const slug = getQueryParam('event');

      if (!slug) {
        card.innerHTML = `
          <p class="rsvp-kicker">RSVP Confirmed</p>
          <h1 class="rsvp-title">Missing event details</h1>
          <p class="rsvp-lead rsvp-error">This confirmation page needs an event slug in the URL, for example <strong>?event=welcome-to-the-world-party</strong>.</p>
          <div class="rsvp-actions">
            <a class="btn btn--soft rsvp-actions__event" href="/event/event.html">Back to events</a>
            <a class="btn btn--soft rsvp-actions__home" href="/#top">Back to home</a>
          </div>
        `;
        return;
      }

      try {
        const eventData = await loadEvent(slug);
        const { frontmatter } = eventData;
        const dateFormatted = formatDateLong(frontmatter.date);

        card.innerHTML = `
          <p class="rsvp-kicker">RSVP Confirmed</p>
          <h1 class="rsvp-title">You're in for ${frontmatter.title}</h1>
          <p class="rsvp-lead">Thanks for RSVPing. Save the event to your calendar so the details stay with you.</p>

          <div class="rsvp-meta">
            <div class="rsvp-meta__item">
              <span class="rsvp-meta__label">Date</span>
              <span class="rsvp-meta__value">${dateFormatted}</span>
            </div>
            <div class="rsvp-meta__item">
              <span class="rsvp-meta__label">Time</span>
              <span class="rsvp-meta__value">${frontmatter.time || 'To be confirmed'}</span>
            </div>
            <div class="rsvp-meta__item">
              <span class="rsvp-meta__label">Location</span>
              <span class="rsvp-meta__value">${frontmatter.location || 'To be confirmed'}</span>
            </div>
          </div>

          <div class="rsvp-actions">
            <button class="calendar-pill" id="saveToCalendar" type="button">Save to Calendar</button>
            <a class="btn btn--soft rsvp-actions__event" href="/event/${slug}/">Back to event</a>
            <a class="btn btn--soft rsvp-actions__home" href="/#top">Back to home</a>
          </div>

          <p class="rsvp-note">The calendar file works with Apple Calendar, Outlook, and Google Calendar import.</p>
        `;

        const saveButton = document.getElementById('saveToCalendar');
        if (saveButton) {
          saveButton.addEventListener('click', () => downloadCalendarFile(eventData));
        }
      } catch (error) {
        console.error('[RSVP Thank You] Failed to load event:', error);
        card.innerHTML = `
          <p class="rsvp-kicker">RSVP Confirmed</p>
          <h1 class="rsvp-title">Your RSVP is in</h1>
          <p class="rsvp-lead rsvp-error">The event details could not be loaded for calendar download.</p>
          <div class="rsvp-actions">
            <a class="btn btn--soft rsvp-actions__event" href="/event/event.html">Back to events</a>
            <a class="btn btn--soft rsvp-actions__home" href="/#top">Back to home</a>
          </div>
        `;
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', renderThankYouPage);
    } else {
      renderThankYouPage();
    }
  </script>
</body>
</html>
