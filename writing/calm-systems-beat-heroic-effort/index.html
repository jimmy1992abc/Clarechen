<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b1220" />
  <title>Writing Article - Clare Chen</title>
  <meta name="description" content="Writing article page." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../assets/css/site.css" />

  <style>
    .article-wrap { max-width: 760px; margin: 0 auto; }
    .article-head { margin-bottom: 24px; }
    .article-title { margin: 0; font-family: var(--font-serif); font-size: clamp(32px, 5vw, 52px); }
    .article-meta { margin-top: 10px; color: var(--muted); font-weight: 700; font-size: 13px; display: flex; gap: 10px; align-items: center; }
    .article-body { color: rgba(234,240,255,.92); line-height: 1.8; }
    .article-body h2 { margin-top: 28px; margin-bottom: 10px; font-family: var(--font-serif); }
    .article-body p { margin: 0 0 14px; }
    .article-body ul { margin: 0 0 16px 20px; }
  </style>
</head>
<body>
  <header class="header" id="header">
    <div class="container header__inner">
      <a class="brand" href="/" aria-label="Home">
        <span class="brand__dot" aria-hidden="true"></span>
        <span class="brand__text">Clare Chen</span>
      </a>
      <nav class="nav" aria-label="Primary">
        <div class="nav__menu" id="navMenu">
          <a class="nav__link" href="/writing/">Back to writing</a>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container article-wrap">
        <div class="article-head">
          <h1 class="article-title" id="articleTitle">Loading...</h1>
          <div class="article-meta">
            <span id="articleDate">-</span>
            <span class="post__dot" aria-hidden="true"></span>
            <span id="articleReadTime">-</span>
          </div>
        </div>
        <article class="article-body" id="articleBody"></article>
      </div>
    </section>
  </main>

  <script>
    function parseFrontmatter(text) {
      const normalized = text.replace(/^\uFEFF/, '').replace(/\r\n?/g, '\n');
      const m = normalized.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
      if (!m) return null;
      const frontmatter = {};
      m[1].split('\n').forEach((line) => {
        const [k, ...rest] = line.split(':');
        if (!k || rest.length === 0) return;
        frontmatter[k.trim()] = rest.join(':').trim().replace(/^["'](.*)["']$/, '$1');
      });
      return { frontmatter, content: m[2] };
    }

    function markdownToHtml(md) {
      const lines = md.split('\n');
      let html = '';
      let inList = false;

      for (const rawLine of lines) {
        const line = rawLine.trim();
        if (!line) {
          if (inList) {
            html += '</ul>';
            inList = false;
          }
          continue;
        }

        if (line.startsWith('## ')) {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<h2>${line.slice(3)}</h2>`;
          continue;
        }

        if (line.startsWith('# ')) {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<h1>${line.slice(2)}</h1>`;
          continue;
        }

        if (line.startsWith('- ')) {
          if (!inList) {
            html += '<ul>';
            inList = true;
          }
          html += `<li>${line.slice(2)}</li>`;
          continue;
        }

        if (inList) {
          html += '</ul>';
          inList = false;
        }

        html += `<p>${line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</p>`;
      }

      if (inList) html += '</ul>';
      return html;
    }

    async function loadArticle() {
      const parts = window.location.pathname.split('/').filter(Boolean);
      const slug = parts[parts.length - 1] || 'template';
      const response = await fetch(`./${slug}.md`);
      if (!response.ok) {
        document.getElementById('articleTitle').textContent = 'Article not found';
        return;
      }

      const parsed = parseFrontmatter(await response.text());
      if (!parsed) {
        document.getElementById('articleTitle').textContent = 'Invalid markdown format';
        return;
      }

      document.getElementById('articleTitle').textContent = parsed.frontmatter.title || 'Untitled';
      document.getElementById('articleDate').textContent = parsed.frontmatter.date || 'No date';
      document.getElementById('articleReadTime').textContent = parsed.frontmatter.readTime || '5 min read';
      document.getElementById('articleBody').innerHTML = markdownToHtml(parsed.content);
      document.title = `${parsed.frontmatter.title || 'Writing'} - Clare Chen`;
    }

    loadArticle();
  </script>
</body>
</html>
